changelog:
  security:
  - Encrypt credentials saved through the generic plugin configuration endpoint instead of waiting for the next run
  - Warn in the log when a record updates over plain http
  - Show a dashboard warning when credential encryption is unavailable and secrets are stored in plaintext
  developer:
  - Share one SecretProtector between the dashboard and generic save paths
  - Snapshot the configuration per update run instead of mutating live records
  fixes:
  - Prune record status against fresh record ids so a record added mid-run is not dropped