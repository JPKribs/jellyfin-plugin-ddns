overview: "Keep your DNS records pointed at your server's current public IP."
description: >
  Keeps one or more DNS records pointed at your Jellyfin server's current public IP. 
  Runs entirely in-process as a scheduled task and updates. Great for anyone who wants 
  to run their entire stack entirely through Jellyfin without external programs or dependencies.
